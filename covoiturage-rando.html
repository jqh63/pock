<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Covoiturage Rando — Pock</title>
<meta name="description" content="Calcul des frais de covoiturage pour les randonnées">
<meta name="theme-color" content="#2d5a27">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Covoit Rando">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192-v2.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon-v2.png">
<link rel="stylesheet" href="common.css">
<style>
  :root {
    --bg: #f3f2ee; --surface: #fff; --border: #d8d4ca;
    --text: #2c2c2c; --text2: #4a4a42; --text3: #7a7668;
    --green: #2d5a27; --green-bg: #f0f7ef; --green-border: #c8ddc5;
    --danger: #c0392b; --danger-bg: #fdf0ef;
    --accent: var(--green);
  }
  .app { max-width: 520px; margin: 0 auto; padding: 20px 16px 40px; }
  .header { text-align: center; margin-bottom: 28px; }
  .icon { font-size: 48px; margin-bottom: 4px; }
  .title { font-size: 24px; font-weight: 700; color: var(--green); letter-spacing: -0.03em; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: var(--text3); }
  .card { background: var(--surface); border-radius: 16px; padding: 24px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 20px; }
  .input-group { margin-bottom: 20px; }
  .input-group label { display: block; font-size: 15px; font-weight: 600; margin-bottom: 8px; color: #3a3a35; }
  .input-group input { width: 100%; padding: 14px 16px; font-size: 22px; font-weight: 700; border: 2px solid var(--border); border-radius: 12px; background: #faf9f6; color: var(--text); font-family: var(--font-serif); outline: none; transition: border-color .2s; }
  .input-group input:focus { border-color: var(--green); }
  .error { font-size: 14px; color: var(--danger); margin: 0 0 12px; padding: 8px 12px; background: var(--danger-bg); border-radius: 8px; }
  .btn-row { display: flex; gap: 12px; margin-top: 8px; }
  .btn { border: none; border-radius: 12px; cursor: pointer; font-family: var(--font-serif); transition: all .15s; }
  .btn:hover { opacity: .88; }
  .btn-primary { flex: 2; padding: 16px 20px; font-size: 19px; font-weight: 700; background: var(--green); color: #fff; box-shadow: 0 4px 14px rgba(45,90,39,0.3); }
  .btn-primary:disabled { background: var(--border); color: #999; box-shadow: none; cursor: default; }
  .btn-secondary { flex: 1; padding: 16px 12px; font-size: 16px; font-weight: 600; border: 2px solid var(--border); background: #fff; color: #666; border-radius: 12px; cursor: pointer; font-family: var(--font-serif); }
  .result-card { background: var(--surface); border-radius: 16px; padding: 24px 20px; box-shadow: 0 2px 16px rgba(45,90,39,0.1); border: 2px solid var(--green); margin-bottom: 20px; }
  .result-title { font-size: 20px; font-weight: 700; color: var(--green); text-align: center; margin-bottom: 20px; }
  .big-result { background: var(--green-bg); border-radius: 14px; padding: 20px 16px; margin-bottom: 20px; }
  .big-item { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .big-label { font-size: 15px; color: var(--text2); font-weight: 600; }
  .big-amount { font-size: 42px; font-weight: 700; color: var(--text); line-height: 1.1; font-family: var(--font-mono); }
  .big-amount-green { font-size: 42px; font-weight: 700; color: var(--green); line-height: 1.1; font-family: var(--font-mono); }
  .net-note { font-size: 13px; color: var(--text3); font-style: italic; }
  .result-divider { height: 1px; background: var(--green-border); margin: 16px 0; }
  .detail-box { background: #f8f7f4; border-radius: 12px; padding: 16px 14px; margin-bottom: 16px; }
  .detail-heading { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text2); margin-bottom: 12px; }
  .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 14px; color: #4a4a45; border-bottom: 1px solid #eae8e2; flex-wrap: wrap; gap: 4px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-val { font-weight: 600; color: var(--text); text-align: right; }
  .surplus-row { color: var(--green); font-weight: 600; border-bottom: none; }
  .save-btn { width: 100%; padding: 12px; font-size: 16px; font-weight: 600; border-radius: 10px; border: 2px solid var(--border); background: #fff; color: #4a4a45; cursor: pointer; font-family: var(--font-serif); }
  .save-btn:hover { background: #f8f7f4; }
  .tier-section { margin-bottom: 20px; }
  .tier-toggle { width: 100%; padding: 14px 16px; font-size: 15px; font-weight: 600; border-radius: 12px; border: 2px solid var(--border); background: #fff; color: var(--text2); cursor: pointer; font-family: var(--font-serif); text-align: left; }
  .tier-card { background: #fff; border-radius: 0 0 12px 12px; padding: 16px; border: 2px solid var(--border); border-top: none; }
  .tier-note { font-size: 13px; color: var(--text3); font-style: italic; margin-bottom: 12px; line-height: 1.5; }
  .tier-table { border-radius: 10px; overflow: hidden; border: 1px solid #e0ddd6; }
  .tier-header { display: flex; background: var(--green); color: #fff; }
  .tier-header-cell { flex: 1; padding: 10px 14px; font-size: 14px; font-weight: 700; text-align: center; }
  .tier-row { display: flex; }
  .tier-row:nth-child(even) { background: #f8f7f4; }
  .tier-cell { flex: 1; padding: 10px 14px; font-size: 15px; text-align: center; }
  .history { background: var(--surface); border-radius: 16px; padding: 20px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 20px; }
  .history-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; color: #3a3a35; }
  .history-item { padding: 10px 0; border-bottom: 1px solid #eae8e2; }
  .history-item:last-of-type { border-bottom: none; }
  .history-date { font-size: 13px; color: var(--text3); font-weight: 600; }
  .history-detail { font-size: 14px; color: #3a3a35; margin-top: 2px; }
  .history-clear { margin-top: 12px; padding: 8px 14px; font-size: 14px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: #999; cursor: pointer; font-family: var(--font-serif); }
  .footer { text-align: center; font-size: 12px; color: var(--text3); padding: 8px 0; }
  .card, .result-card, .history { animation: pockFadeIn .35s ease both; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script src="common.js"></script>
<script>
const RATE = 0.30;
const TIERS = [{min:0,max:10,amount:1},{min:11,max:20,amount:2},{min:21,max:40,amount:3},{min:41,max:60,amount:4},{min:61,max:80,amount:5},{min:81,max:100,amount:6},{min:101,max:130,amount:7}];
const HISTORY_KEY = "pock-covoit-history";

let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
let result = null;
let showTiers = false;
let formKm = "", formPart = "", formDriv = "";
let errorMsg = "";

function saveHistory() { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }

function calc(km, p, d) {
  if (!km || !p || !d || p < d || d < 1 || km < 1) return null;
  const rawReimb = km * RATE;
  const reimbPerDriver = Math.ceil(rawReimb);
  const totalCost = d * reimbPerDriver;
  const rawPP = totalCost / p;
  const perPerson = Math.ceil(rawPP);
  const totalCollected = perPerson * p;
  return { km, participants: p, drivers: d, passengers: p - d, rawReimb: rawReimb.toFixed(2), reimbPerDriver, totalCost, rawPerPerson: rawPP.toFixed(2), perPerson, totalCollected, surplus: totalCollected - totalCost, driverNet: reimbPerDriver - perPerson };
}

function render() {
  const r = result;

  document.getElementById("app").innerHTML = `
    <a class="pock-back" href="index.html">← Pock</a>
    <div class="header">
      <div class="icon" aria-hidden="true">🥾</div>
      <div class="title">Covoiturage Rando</div>
      <div class="subtitle">Calcul des frais · ${RATE.toFixed(2)}€/km</div>
    </div>
    <div class="card">
      <div class="input-group"><label for="inKm">📏 Kilomètres aller-retour</label><input type="text" inputmode="numeric" pattern="[0-9]*" id="inKm" value="${esc(formKm)}" placeholder="ex: 60"></div>
      <div class="input-group"><label for="inPart">👥 Nombre total de participants</label><input type="text" inputmode="numeric" pattern="[0-9]*" id="inPart" value="${esc(formPart)}" placeholder="ex: 11"></div>
      <div class="input-group"><label for="inDriv">🚗 Nombre de voitures (conducteurs)</label><input type="text" inputmode="numeric" pattern="[0-9]*" id="inDriv" value="${esc(formDriv)}" placeholder="ex: 3"></div>
      ${errorMsg ? `<p class="error" role="alert">⚠️ ${esc(errorMsg)}</p>` : ''}
      <div class="btn-row">
        <button class="btn btn-primary" onclick="doCalc()">Calculer</button>
        <button class="btn-secondary" onclick="doReset()">Effacer</button>
      </div>
    </div>
    ${r ? `
    <div class="result-card">
      <div class="result-title">Résultat</div>
      <div class="big-result">
        <div class="big-item"><span class="big-label">Chaque participant paye</span><span class="big-amount">${r.perPerson}€</span></div>
        <div class="result-divider"></div>
        <div class="big-item"><span class="big-label">Chaque conducteur reçoit</span><span class="big-amount-green">${r.reimbPerDriver}€</span><span class="net-note">(net après sa part : ${r.driverNet}€)</span></div>
      </div>
      <div class="detail-box">
        <div class="detail-heading">Détail</div>
        <div class="detail-row"><span>Trajet aller-retour</span><span class="detail-val">${r.km} km</span></div>
        <div class="detail-row"><span>Participants</span><span class="detail-val">${r.participants} (${r.drivers} conducteur${r.drivers>1?'s':''} + ${r.passengers} passager${r.passengers>1?'s':''})</span></div>
        <div class="detail-row"><span>Remboursement par voiture</span><span class="detail-val">${r.km} × ${RATE.toFixed(2)}€ = ${r.rawReimb}€ → <strong>${r.reimbPerDriver}€</strong></span></div>
        <div class="detail-row"><span>Coût total</span><span class="detail-val">${r.drivers} × ${r.reimbPerDriver}€ = ${r.totalCost}€</span></div>
        <div class="detail-row"><span>Part par personne</span><span class="detail-val">${r.totalCost}€ ÷ ${r.participants} = ${r.rawPerPerson}€ → <strong>${r.perPerson}€</strong></span></div>
        <div class="detail-row"><span>Total collecté</span><span class="detail-val">${r.participants} × ${r.perPerson}€ = ${r.totalCollected}€</span></div>
        ${r.surplus > 0 ? `<div class="detail-row surplus-row"><span>Excédent (caisse du club)</span><span class="detail-val">+${r.surplus}€</span></div>` : ''}
      </div>
      <button class="save-btn" onclick="doSave()">💾 Enregistrer dans l'historique</button>
    </div>` : ''}
    <div class="tier-section">
      <button class="tier-toggle" onclick="toggleTiers()" aria-expanded="${showTiers}" aria-controls="tierCard">${showTiers ? '▲' : '▼'} Barème de secours (sans l'appli)</button>
      ${showTiers ? `<div class="tier-card" id="tierCard"><p class="tier-note">Ce barème simplifié suppose ~4 personnes par voiture.<br>Préférez le calcul exact ci-dessus quand possible.</p><div class="tier-table"><div class="tier-header"><span class="tier-header-cell">Distance A/R</span><span class="tier-header-cell">Par personne</span></div>${TIERS.map(t=>`<div class="tier-row"><span class="tier-cell">${t.min} – ${t.max} km</span><span class="tier-cell" style="font-weight:700">${t.amount}€</span></div>`).join('')}</div></div>` : ''}
    </div>
    ${history.length > 0 ? `<div class="history"><div class="history-title">📋 Historique</div>${history.map(h=>`<div class="history-item"><div class="history-date">${esc(h.date)}</div><div class="history-detail">${h.km}km · ${h.participants} pers. · ${h.drivers} voit. → <strong>${h.perPerson}€/pers</strong> · <strong>${h.reimbPerDriver}€/conducteur</strong></div></div>`).join('')}<button class="history-clear" onclick="clearHistory()">Vider l'historique</button></div>` : ''}
    <div class="footer">Pock · Taux : ${RATE.toFixed(2)}€/km · Arrondis à l'euro supérieur</div>
  `;
  bindInput("inKm", v => { formKm = v; result = null; });
  bindInput("inPart", v => { formPart = v; result = null; });
  bindInput("inDriv", v => { formDriv = v; result = null; });
}

function syncForm() {
  const km = document.getElementById("inKm");
  const part = document.getElementById("inPart");
  const driv = document.getElementById("inDriv");
  if (km) formKm = km.value;
  if (part) formPart = part.value;
  if (driv) formDriv = driv.value;
}

function bindInput(id, setter) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener("input", e => { setter(e.target.value); });
}

function doCalc() {
  syncForm();
  // Detect text/invalid entries
  const hasInvalid = [formKm, formPart, formDriv].some(v => v.trim() !== "" && isNaN(parseInt(v)));
  if (hasInvalid) { errorMsg = "Les champs doivent contenir uniquement des nombres"; result = null; render(); return; }
  const k = parseInt(formKm)||0, p = parseInt(formPart)||0, d = parseInt(formDriv)||0;
  if (!k || !p || !d) { errorMsg = "Remplis tous les champs"; result = null; render(); return; }
  if (k < 1 || p < 1 || d < 1) { errorMsg = "Les valeurs doivent être supérieures à 0"; result = null; render(); return; }
  if (p < d) { errorMsg = "Il ne peut pas y avoir plus de voitures que de participants"; result = null; render(); return; }
  errorMsg = "";
  result = calc(k, p, d);
  render();
}
function doReset() { formKm = ""; formPart = ""; formDriv = ""; result = null; errorMsg = ""; render(); }
function doSave() { if (!result) return; history = [{ ...result, date: new Date().toLocaleDateString("fr-FR") }, ...history.slice(0, 19)]; saveHistory(); render(); }
function toggleTiers() { syncForm(); showTiers = !showTiers; render(); }
function clearHistory() { syncForm(); history = []; saveHistory(); render(); }

render();
</script>
</body>
</html>
